name: Domain Değişiklik Kontrolü

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "25 */6 * * *"

jobs:
  DomainKontrol:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Depo Kontrolü
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11.8 Yükle
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Python Sürümünü Göster
        run: python -c "import sys; print(sys.version)"

      - name: Gereksinimleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -U setuptools wheel cloudscraper pycryptodome

      - name: Betiği Çalıştır
        run: python KONTROL.py

      - name: Değişiklik Kontrolü
        id: degisiklik_kontrol
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "degisiklik=true" >> $GITHUB_OUTPUT
          else
            echo "degisiklik=false" >> $GITHUB_OUTPUT
          fi

      - name: Değişiklikleri Commit Et
        if: steps.degisiklik_kontrol.outputs.degisiklik == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          git commit -m "🤖 Domain Update" -m "Automatic domain updates applied"

      - name: Push Changes
        if: steps.degisiklik_kontrol.outputs.degisiklik == 'true'
        run: |
          git push origin HEAD:${{ github.ref_name }}
