name: Build

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Clean previous outputs
        run: rm -rf output

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Plugins
        run: |
          ./gradlew make makePluginsJson

      - name: Prepare build files
        run: |
          mkdir output
          find . -type f -name "*.cs3" -exec cp {} output \;
          cp build/plugins.json output || true

      - name: Push to builds branch
        run: |
          cd output
          git init
          git checkout -b builds
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Build $GITHUB_SHA"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} builds --force
