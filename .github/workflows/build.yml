name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Source kodu çek
      - name: Checkout source
        uses: actions/checkout@v4

      # 📥 builds branch çek (yoksa sorun çıkarmaz)
      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds
        continue-on-error: true

      # 📁 builds klasörü garanti
      - name: Prepare builds folder
        run: mkdir -p builds

      # 🧹 eski buildleri temizle
      - name: Clean old builds
        run: rm -f builds/*.cs3

      # ☕ Java kurulumu
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # 📱 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # 🔨 Build işlemi
      - name: Build Plugins
        run: |
          chmod +x gradlew || true
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 builds || true
          cp build/plugins.json builds || true

      # 🚀 buildleri builds branch'e pushla
      - name: Push builds
        run: |
          cd builds
          git init
          git checkout -B builds
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} builds --force
